<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <!-- MOBILE: viewport + no-zoom + fullscreen -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>💕 Love Pursuit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0f172a;
      /* Ngăn double-tap zoom trên iOS */
      touch-action: manipulation;
    }

    canvas {
      display: block;
      /* Đảm bảo canvas full màn hình */
      width: 100% !important;
      height: 100% !important;
    }

    /* ===== QUESTION OVERLAY ===== */
    #question-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 100;
      /* Căn giữa nội dung, hỗ trợ virtual keyboard đẩy lên */
      align-items: flex-start;
      justify-content: center;
      padding-top: 8vh;
      /* Scroll nếu bàn phím che */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #question-box {
      background: #1e293b;
      border: 3px solid #6366f1;
      border-radius: 20px;
      padding: clamp(16px, 4vw, 32px);
      width: min(92vw, 540px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      /* Đẩy lên khi bàn phím mở */
      margin-bottom: env(keyboard-inset-height, 0px);
    }

    #question-progress {
      font-size: clamp(12px, 3.5vw, 16px);
      color: #94a3b8;
      font-family: 'Segoe UI', sans-serif;
      line-height: 1.4;
    }

    #question-text {
      font-size: clamp(18px, 5vw, 26px);
      color: #f1f5f9;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 600;
      line-height: 1.4;
    }

    #answer-input {
      width: 100%;
      padding: clamp(10px, 2.5vw, 14px) clamp(12px, 3vw, 18px);
      font-size: clamp(16px, 4.5vw, 20px);
      /* font-size >= 16px để iOS không zoom */
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      border: 2px solid #334155;
      border-radius: 12px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    #answer-input:focus { border-color: #6366f1; }

    #submit-btn {
      width: 100%;
      padding: clamp(12px, 3vw, 16px);
      font-size: clamp(16px, 4.5vw, 20px);
      font-family: 'Segoe UI', sans-serif;
      font-weight: 700;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      /* Dễ bấm trên mobile */
      min-height: 52px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #submit-btn:active { background: #4f46e5; transform: scale(0.97); }

    #feedback {
      font-size: clamp(14px, 4vw, 18px);
      font-family: 'Segoe UI', sans-serif;
      min-height: 24px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Question Overlay -->
  <div id="question-overlay">
    <div id="question-box">
      <div id="question-progress"></div>
      <div id="question-text"></div>
      <input
        id="answer-input"
        type="text"
        placeholder="Nhập đáp án..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        enterkeyhint="done"
      />
      <button id="submit-btn">✅ Xác nhận</button>
      <div id="feedback"></div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
