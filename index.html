<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Quiz Game 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    /* === OVERLAY CÂU HỎI === */
    #question-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.80);
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #question-box {
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      max-width: 440px;
      width: 92%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      animation: popIn 0.25s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    #question-progress {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    /* Thanh streak */
    #streak-bar-wrap {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .streak-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #e2e8f0;
      border: 2px solid #cbd5e1;
      transition: all 0.3s;
    }
    .streak-dot.done {
      background: #22c55e;
      border-color: #16a34a;
    }
    #question-box h2 {
      font-size: 22px;
      color: #1e293b;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    #answer-input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      margin-bottom: 14px;
      outline: none;
      transition: border 0.2s;
    }
    #answer-input:focus { border-color: #6366f1; }
    #submit-btn {
      padding: 12px 36px;
      font-size: 17px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    #submit-btn:hover  { background: #4f46e5; }
    #submit-btn:active { transform: scale(0.97); }
    #feedback {
      margin-top: 14px;
      font-size: 17px;
      font-weight: bold;
      min-height: 26px;
    }
  </style>
</head>
<body>
  <!-- OVERLAY CÂU HỎI -->
  <div id="question-overlay">
    <div id="question-box">
      <p id="question-progress">Câu 1</p>
      <div id="streak-bar-wrap">
        <div class="streak-dot" id="dot-0"></div>
        <div class="streak-dot" id="dot-1"></div>
    
      </div>
      <h2 id="question-text">Câu hỏi?</h2>
      <input id="answer-input" type="text" placeholder="Nhập đáp án..." autocomplete="off"/>
      <br/>
      <button id="submit-btn">✅ Trả lời</button>
      <p id="feedback"></p>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
