<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦖 Vòng Quay Tình Yêu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --pink:  #FF4F9A;
    --pink2: #FF85BB;
    --purple:#A855F7;
    --gold:  #FFD700;
    --bg1:   #1a0030;
    --bg2:   #3d0060;
    --bg3:   #600090;
    --card:  rgba(255,255,255,0.07);
    --border:rgba(255,255,255,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height:100vh;
    background: radial-gradient(ellipse at 20% 20%, #3d0060 0%, #1a0030 40%, #0d001f 100%);
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    color:#fff;
    overflow-x:hidden;
  }

  /* ── STARS BG ── */
  #stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .star {
    position:absolute; border-radius:50%; background:#fff;
    animation: twinkle linear infinite;
  }
  @keyframes twinkle {
    0%,100%{opacity:0.1;transform:scale(1)}
    50%{opacity:0.9;transform:scale(1.4)}
  }

  /* ── FLOATING DINOS BG ── */
  .bg-dino {
    position:fixed; font-size:2.5rem; opacity:0.07;
    pointer-events:none; z-index:0;
    animation: floatDino linear infinite;
  }
  @keyframes floatDino {
    0%  { transform: translateY(110vh) rotate(-10deg); opacity:0; }
    10% { opacity:0.07; }
    90% { opacity:0.07; }
    100%{ transform: translateY(-120px) rotate(10deg); opacity:0; }
  }

  /* ── LAYOUT ── */
  .page { position:relative; z-index:1; max-width:760px; margin:0 auto; padding:20px 16px 60px; }

  /* ── HEADER ── */
  .header { text-align:center; margin-bottom:28px; padding-top:10px; }
  .header .crown { font-size:2.4rem; animation:crownSpin 4s ease-in-out infinite; display:block; margin-bottom:4px; }
  @keyframes crownSpin { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
  .header h1 {
    font-size:clamp(1.8rem,5vw,2.8rem);
    font-weight:900;
    background: linear-gradient(135deg, #FF85BB, #FFD700, #FF4F9A, #A855F7);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    text-shadow:none;
    letter-spacing:1px;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }
  .header p { color:rgba(255,255,255,0.55); font-size:0.9rem; margin-top:6px; }

  /* ── TWO-COL LAYOUT ── */
  .main-grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
    align-items:start;
  }
  @media(max-width:600px) { .main-grid { grid-template-columns:1fr; } }

  /* ── GLASS CARD ── */
  .card {
    background: var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:20px;
    backdrop-filter:blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .card-title {
    font-size:0.88rem; font-weight:700;
    color:var(--pink2); letter-spacing:1px;
    text-transform:uppercase; margin-bottom:14px;
    display:flex; align-items:center; gap:7px;
  }
  .card-title::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(to right, rgba(255,133,187,0.4), transparent);
  }

  /* ── INPUT ── */
  .inp-wrap { display:flex; gap:8px; margin-bottom:12px; }
  .inp-wrap input {
    flex:1; padding:10px 15px;
    background:rgba(255,255,255,0.08);
    border:1.5px solid rgba(255,255,255,0.18);
    border-radius:40px; color:#fff; font-size:0.88rem;
    font-family:inherit; outline:none;
    transition:border-color 0.25s, background 0.25s;
  }
  .inp-wrap input::placeholder { color:rgba(255,255,255,0.3); }
  .inp-wrap input:focus { border-color:var(--pink2); background:rgba(255,255,255,0.12); }
  .btn-add {
    padding:10px 15px;
    background:linear-gradient(135deg,#FF4F9A,#A855F7);
    border:none; border-radius:40px; color:#fff;
    font-size:1rem; cursor:pointer; font-weight:700;
    transition:transform 0.15s, box-shadow 0.15s;
    box-shadow:0 4px 14px rgba(255,79,154,0.4);
    white-space:nowrap;
  }
  .btn-add:hover { transform:scale(1.07); box-shadow:0 6px 20px rgba(255,79,154,0.55); }

  .reward-chips { display:flex; flex-wrap:wrap; gap:7px; max-height:130px; overflow-y:auto; }
  .chip {
    background:linear-gradient(135deg,rgba(255,79,154,0.25),rgba(168,85,247,0.25));
    border:1px solid rgba(255,133,187,0.4);
    border-radius:20px; padding:5px 12px;
    font-size:0.78rem; color:#FFB3D1;
    display:flex; align-items:center; gap:6px;
    animation:chipPop 0.28s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes chipPop { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
  .chip .x { cursor:pointer; opacity:0.5; font-size:0.72rem; transition:opacity 0.15s; }
  .chip .x:hover { opacity:1; }
  .reward-chips::-webkit-scrollbar { width:3px; }
  .reward-chips::-webkit-scrollbar-thumb { background:rgba(255,133,187,0.4); border-radius:2px; }

  .auto-tags { margin-top:10px; display:flex; flex-wrap:wrap; gap:6px; }
  .auto-tag {
    font-size:0.72rem; padding:3px 10px;
    border-radius:20px; border:1px dashed rgba(255,255,255,0.25);
    color:rgba(255,255,255,0.45);
  }

  /* ── WHEEL WRAPPER ── */
  .wheel-col { display:flex; flex-direction:column; align-items:center; gap:16px; }

  .wheel-wrap { position:relative; display:inline-block; }
  canvas#wheel { display:block; border-radius:50%; }

  /* center spin button ON the wheel */
  #spinBtn {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:72px; height:72px;
    border-radius:50%;
    background:linear-gradient(135deg,#FF4F9A,#A855F7,#FF4F9A);
    background-size:200% 200%;
    animation:btnGradient 3s ease infinite;
    border:3px solid rgba(255,255,255,0.7);
    color:#fff; font-size:0.78rem; font-weight:900;
    font-family:inherit;
    cursor:pointer; z-index:10;
    box-shadow: 0 0 0 6px rgba(255,79,154,0.25), 0 8px 24px rgba(255,79,154,0.5);
    transition:transform 0.18s, box-shadow 0.18s;
    line-height:1.2; text-align:center;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
  }
  #spinBtn:hover:not(:disabled) {
    transform:translate(-50%,-50%) scale(1.12);
    box-shadow:0 0 0 8px rgba(255,79,154,0.3), 0 10px 30px rgba(255,79,154,0.6);
  }
  #spinBtn:disabled {
    background:linear-gradient(135deg,#555,#333);
    box-shadow:0 0 0 4px rgba(255,255,255,0.1);
    cursor:not-allowed; animation:none;
  }
  @keyframes btnGradient {
    0%,100%{background-position:0% 50%}
    50%{background-position:100% 50%}
  }
  #spinBtn .btn-icon { font-size:1.4rem; }
  #spinBtn .btn-txt { font-size:0.62rem; letter-spacing:0.5px; }

  /* pointer claw top */
  .claw {
    position:absolute; top:-14px; left:50%; transform:translateX(-50%);
    font-size:1.8rem; z-index:11; filter:drop-shadow(0 2px 6px rgba(255,79,154,0.6));
    animation:clawPulse 1.5s ease-in-out infinite;
  }
  @keyframes clawPulse {
    0%,100%{transform:translateX(-50%) translateY(0)}
    50%{transform:translateX(-50%) translateY(-3px)}
  }

  /* wheel glow ring */
  .wheel-glow {
    position:absolute; inset:-10px;
    border-radius:50%;
    background:transparent;
    box-shadow:0 0 30px rgba(255,79,154,0.35), 0 0 60px rgba(168,85,247,0.2);
    pointer-events:none;
    animation:ringPulse 2.5s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100%{box-shadow:0 0 25px rgba(255,79,154,0.3),0 0 50px rgba(168,85,247,0.15)}
    50%{box-shadow:0 0 45px rgba(255,79,154,0.55),0 0 90px rgba(168,85,247,0.3)}
  }

  /* ── RESULT PANEL ── */
  #resultPanel {
    display:none;
    animation:slideUp 0.45s cubic-bezier(.34,1.56,.64,1);
    margin-top:6px;
  }
  @keyframes slideUp { from{transform:translateY(30px) scale(0.9);opacity:0} to{transform:none;opacity:1} }

  .result-inner {
    border-radius:24px; padding:22px 20px; text-align:center;
    position:relative; overflow:hidden;
  }
  .result-inner::before {
    content:''; position:absolute; inset:0; opacity:0.12;
    background: repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);
    background-size:18px 18px;
    pointer-events:none;
  }
  .result-emoji { font-size:3rem; display:block; margin-bottom:8px; animation:bounceIn 0.5s ease; }
  @keyframes bounceIn { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
  .result-label { font-size:0.78rem; color:rgba(255,255,255,0.6); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
  .result-reward { font-size:1.25rem; font-weight:900; margin-bottom:10px; line-height:1.3; }
  .result-msg { font-size:0.88rem; font-weight:700; padding:8px 16px; border-radius:40px; display:inline-block; }

  /* ── SPIN AGAIN ── */
  .btn-again {
    margin-top:14px; padding:11px 30px;
    background:transparent;
    border:2px solid rgba(255,133,187,0.5);
    border-radius:40px; color:#FF85BB;
    font-size:0.9rem; font-weight:700; font-family:inherit;
    cursor:pointer; transition:all 0.2s;
    display:block; width:100%;
  }
  .btn-again:hover {
    background:rgba(255,79,154,0.15);
    border-color:var(--pink); color:#fff;
    transform:scale(1.02);
  }

  /* ── MUSIC ── */
  .music-fab {
    position:fixed; bottom:22px; right:18px;
    width:48px; height:48px; border-radius:50%;
    background:linear-gradient(135deg,#FF4F9A,#A855F7);
    border:2px solid rgba(255,255,255,0.3);
    color:#fff; font-size:1.2rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 16px rgba(255,79,154,0.5); z-index:50;
    transition:transform 0.18s;
  }
  .music-fab:hover { transform:scale(1.12) rotate(10deg); }
  .music-fab.playing { animation:musicSpin 4s linear infinite; }
  @keyframes musicSpin { to{transform:rotate(360deg)} }

  /* ── FLOATING FX ── */
  .heart-fx {
    position:fixed; pointer-events:none; z-index:300;
    animation:heartFloat 3.5s ease-in forwards;
  }
  @keyframes heartFloat {
    0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
    100%{opacity:0;transform:translateY(-90vh) scale(0.5) rotate(720deg)}
  }
  .conf-fx {
    position:fixed; pointer-events:none; z-index:400;
    animation:confDrop 3s ease-in forwards;
  }
  @keyframes confDrop {
    0%{opacity:1;transform:translateY(-50px) rotate(0)}
    100%{opacity:0;transform:translateY(100vh) rotate(1080deg)}
  }
  @keyframes shakeAnim {
    0%,100%{transform:translateX(0)}
    20%,60%{transform:translateX(-10px)}
    40%,80%{transform:translateX(10px)}
  }
  .shake { animation:shakeAnim 0.45s ease; }
  @keyframes jackpotGlow {
    0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.5),0 0 40px rgba(255,79,154,0.3)}
    50%{box-shadow:0 0 50px rgba(255,215,0,0.9),0 0 100px rgba(255,79,154,0.5),0 0 150px rgba(168,85,247,0.3)}
  }
  .jglow { animation:jackpotGlow 1s ease-in-out infinite; }

  /* ── HISTORY ── */
  .history-list { list-style:none; display:flex; flex-direction:column; gap:6px; max-height:160px; overflow-y:auto; }
  .history-list li {
    display:flex; align-items:center; gap:8px;
    font-size:0.82rem; padding:6px 10px;
    background:rgba(255,255,255,0.05); border-radius:10px;
    border-left:3px solid transparent;
    animation:chipPop 0.3s ease;
  }
  .history-list li.h-jackpot  { border-left-color:#FFD700; color:#FFD700; }
  .history-list li.h-retry    { border-left-color:#FF8C00; color:#FF8C00; }
  .history-list li.h-normal   { border-left-color:#FF85BB; color:#FFB3D1; }
  .history-list::-webkit-scrollbar { width:3px; }
  .history-list::-webkit-scrollbar-thumb { background:rgba(255,133,187,0.35); border-radius:2px; }

  .spin-count {
    text-align:center; font-size:0.78rem;
    color:rgba(255,255,255,0.38); margin-top:8px;
  }
  .spin-count span { color:var(--pink2); font-weight:700; }

  /* ── EMPTY STATE ── */
  .empty-hint {
    text-align:center; padding:18px; color:rgba(255,255,255,0.3);
    font-size:0.82rem;
  }
</style>
</head>
<body>

<div id="stars"></div>
<button class="music-fab" id="musicFab">🎵</button>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <span class="crown">🦖</span>
    <h1>Vòng Quay Tình Yêu</h1>
    <p>✨ Để định mệnh lựa chọn phần thưởng ngọt ngào~ ✨</p>
  </div>

  <!-- GRID -->
  <div class="main-grid">

    <!-- LEFT COL -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Input card -->
      <div class="card">
        <div class="card-title">🎁 Phần Thưởng</div>
        <div class="inp-wrap">
          <input id="rewardInput" type="text" placeholder="Nhập phần thưởng… 🍦" maxlength="45"/>
          <button class="btn-add" onclick="addReward()">➕</button>
        </div>
        <div class="reward-chips" id="rewardChips">
          <div class="empty-hint" id="emptyHint">Chưa có phần thưởng nào~</div>
        </div>
        <div class="auto-tags">
          <span class="auto-tag">💍 Jackpot – Hẹn hò chính thức</span>
          <span class="auto-tag">🦴 Thử lại – Dino vấp đá</span>
        </div>
      </div>

      <!-- Result card -->
      <div id="resultPanel">
        <div class="card result-inner" id="resultInner">
          <span class="result-emoji" id="resEmoji">🎉</span>
          <div class="result-label">Kết Quả</div>
          <div class="result-reward" id="resReward"></div>
          <span class="result-msg" id="resMsg"></span>
          <button class="btn-again" onclick="resetSpin()">🎡 Quay Thêm Lần Nữa~</button>
          <a onclick="window.location.href='/'+window.location.pathname.split('/').filter(Boolean)[0]"
            style="display:block; margin-top:10px; padding:12px 30px;
                    background:linear-gradient(135deg,#A855F7,#FF4F9A);
                    border:none; border-radius:40px; color:#fff;
                    font-size:0.9rem; font-weight:800;
                    font-family:'Nunito',sans-serif;
                    text-decoration:none; text-align:center;
                    box-shadow:0 6px 20px rgba(168,85,247,0.45);
                    cursor:pointer;">
            🦖 Chinh phục lại crush~
          </a>
        </div>
      </div>

      <!-- History card -->
      <div class="card" id="historyCard" style="display:none;">
        <div class="card-title">📜 Lịch Sử Quay</div>
        <ul class="history-list" id="historyList"></ul>
        <p class="spin-count">Đã quay: <span id="spinCount">0</span> lần</p>
      </div>

    </div>

    <!-- RIGHT COL - WHEEL -->
    <div class="wheel-col">
      <div class="wheel-wrap">
        <div class="wheel-glow"></div>
        <div class="claw">🦕</div>
        <canvas id="wheel" width="320" height="320"></canvas>
        <button id="spinBtn" onclick="startSpin()">
          <span class="btn-icon">🎡</span>
          <span class="btn-txt">QUAY</span>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
// ── STARS ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = 1 + Math.random() * 3;
  s.style.cssText = `width:${sz}px;height:${sz}px;
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    animation-duration:${2+Math.random()*4}s;
    animation-delay:${Math.random()*5}s;`;
  starsEl.appendChild(s);
}

// BG DINOS
const dinoEmojis = ['🦕','🦖','🌿','🌺','🌸'];
for (let i = 0; i < 8; i++) {
  const d = document.createElement('div');
  d.className = 'bg-dino';
  d.textContent = dinoEmojis[i % dinoEmojis.length];
  d.style.cssText = `left:${Math.random()*100}%;
    animation-duration:${18+Math.random()*20}s;
    animation-delay:${Math.random()*15}s;`;
  document.body.appendChild(d);
}

// ── AUDIO ──
let audioCtx = null, musicOn = false, bgTimer = null;
const musicFab = document.getElementById('musicFab');

function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur=0.07, vol=0.22, type='sine', delay=0) {
  try {
    const c=ac(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value=freq; o.type=type;
    const t=c.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur);
  } catch(e){}
}
function playTick() { tone(700,0.04,0.18,'square'); }
function playWin()  { [523,659,784,1047].forEach((f,i)=>tone(f,0.2,0.25,'sine',i*0.13)); }
function playJack() { [523,659,784,880,1047,1319,1568].forEach((f,i)=>tone(f,0.3,0.28,'triangle',i*0.09)); }
function playOops() { [300,220,180].forEach((f,i)=>tone(f,0.15,0.28,'sawtooth',i*0.1)); }

const MELODY = [523,659,784,880,784,659,523,659,784,698,659,587,523];
let mIdx=0;
function startMusic() {
  bgTimer = setInterval(()=>{ if(!musicOn){clearInterval(bgTimer);return;} tone(MELODY[mIdx++%MELODY.length],0.3,0.06,'sine'); },360);
}
musicFab.addEventListener('click',()=>{
  musicOn=!musicOn;
  musicFab.textContent = musicOn?'🎶':'🎵';
  musicFab.classList.toggle('playing', musicOn);
  if (musicOn) startMusic();
  else { clearInterval(bgTimer); bgTimer=null; }
});

// ── REWARDS ──
let rewards = [];
const AUTO_JACK  = '💍 Jackpot – Hẹn hò chính thức';
const AUTO_RETRY = '🦴 Thử lại – Dino vấp đá';

function getSegs() { return [...rewards, AUTO_JACK, AUTO_RETRY]; }

function addReward() {
  const inp = document.getElementById('rewardInput');
  const v = inp.value.trim();
  if (!v) {
    inp.style.borderColor='#FF4444';
    setTimeout(()=>inp.style.borderColor='',1500);
    return;
  }
  rewards.push(v);
  renderChips(); drawWheel(); inp.value=''; inp.focus();
}
document.getElementById('rewardInput').addEventListener('keypress',e=>{ if(e.key==='Enter') addReward(); });

function removeReward(i) { rewards.splice(i,1); renderChips(); drawWheel(); }

function renderChips() {
  const wrap = document.getElementById('rewardChips');
  const hint = document.getElementById('emptyHint');
  // clear existing chips
  [...wrap.querySelectorAll('.chip')].forEach(c=>c.remove());
  if (rewards.length === 0) { hint.style.display=''; return; }
  hint.style.display='none';
  rewards.forEach((r,i)=>{
    const chip = document.createElement('div');
    chip.className='chip';
    chip.innerHTML=`<span>🎀 ${r}</span><span class="x" onclick="removeReward(${i})">✕</span>`;
    wrap.appendChild(chip);
  });
}

// ── WHEEL ──
const cv = document.getElementById('wheel');
const cx = cv.getContext('2d');
const W = cv.width, H = cv.height, CX=W/2, CY=H/2, R=W/2-8;

const SLICE_COLORS = [
  ['#FF6B9D','#FF4F9A'],['#A78BFA','#8B5CF6'],['#34D399','#10B981'],
  ['#60A5FA','#3B82F6'],['#FBBF24','#F59E0B'],['#F87171','#EF4444'],
  ['#C084FC','#A855F7'],['#2DD4BF','#14B8A6'],['#FB923C','#F97316'],
  ['#A3E635','#84CC16'],['#E879F9','#D946EF'],['#38BDF8','#0EA5E9'],
];

let spinAngle = -Math.PI/2;
let spinning = false;
let spinCount = 0;

function drawWheel() {
  const segs = getSegs();
  const n = segs.length;
  const arc = (2*Math.PI)/n;
  cx.clearRect(0,0,W,H);

  // Outer decorative ring
  cx.beginPath(); cx.arc(CX,CY,R+6,0,2*Math.PI);
  const ringGrad = cx.createLinearGradient(0,0,W,H);
  ringGrad.addColorStop(0,'rgba(255,79,154,0.6)');
  ringGrad.addColorStop(0.5,'rgba(168,85,247,0.6)');
  ringGrad.addColorStop(1,'rgba(255,79,154,0.6)');
  cx.fillStyle=ringGrad; cx.fill();

  for (let i=0;i<n;i++) {
    const a0 = spinAngle + i*arc;
    const a1 = a0 + arc;
    const [c1,c2] = SLICE_COLORS[i%SLICE_COLORS.length];

    // Gradient per slice
    const grd = cx.createRadialGradient(CX,CY,20,CX,CY,R);
    grd.addColorStop(0.2, c1+'cc');
    grd.addColorStop(1,   c2+'ee');

    cx.beginPath(); cx.moveTo(CX,CY); cx.arc(CX,CY,R,a0,a1); cx.closePath();
    cx.fillStyle=grd; cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.22)'; cx.lineWidth=1.5; cx.stroke();

    // Text
    cx.save();
    cx.translate(CX,CY); cx.rotate(a0+arc/2);
    cx.textAlign='center'; cx.textBaseline='middle';
    const fs = Math.max(8,Math.min(12,190/n));
    cx.font=`bold ${fs}px Nunito,sans-serif`;
    cx.fillStyle='rgba(255,255,255,0.95)';
    cx.shadowColor='rgba(0,0,0,0.5)'; cx.shadowBlur=4;
    const txt = segs[i].length>19 ? segs[i].slice(0,18)+'…' : segs[i];
    cx.fillText(txt, R*0.6, 0);
    cx.restore();
  }

  // Center circle (behind button)
  const cg = cx.createRadialGradient(CX,CY,5,CX,CY,32);
  cg.addColorStop(0,'#FF80AB'); cg.addColorStop(1,'#7C3AED');
  cx.beginPath(); cx.arc(CX,CY,32,0,2*Math.PI);
  cx.fillStyle=cg; cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.5)'; cx.lineWidth=3; cx.stroke();

  // Pointer notch at top
  cx.save();
  cx.translate(CX, 6);
  cx.beginPath(); cx.moveTo(0,-3); cx.lineTo(-8,8); cx.lineTo(8,8); cx.closePath();
  cx.fillStyle='#FFD700';
  cx.shadowColor='rgba(255,215,0,0.8)'; cx.shadowBlur=10;
  cx.fill(); cx.restore();
}
drawWheel();

// ── SPIN ──
function startSpin() {
  if (spinning) return;
  if (rewards.length===0) {
    const card = document.querySelector('.card');
    card.classList.add('shake');
    setTimeout(()=>card.classList.remove('shake'),500);
    document.getElementById('rewardInput').focus();
    return;
  }

  spinning=true;
  const btn=document.getElementById('spinBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="btn-icon">⏳</span><span class="btn-txt">ĐANG QUAY</span>';
  document.getElementById('resultPanel').style.display='none';

  const segs=getSegs(), n=segs.length, arc=(2*Math.PI)/n;
  const jackIdx=segs.indexOf(AUTO_JACK), retIdx=segs.indexOf(AUTO_RETRY);

  // Weighted pick
  const rnd=Math.random();
  let tIdx;
  if (rnd<0.07) { tIdx=jackIdx; }
  else if (rnd<0.20) { tIdx=retIdx; }
  else {
    const pool=segs.map((_,i)=>i).filter(i=>i!==jackIdx&&i!==retIdx);
    tIdx=pool[Math.floor(Math.random()*pool.length)];
  }

  const rounds = 5 + Math.random()*2.5;
  const target = -Math.PI/2 - tIdx*arc - arc/2;
  const diff = ((target-spinAngle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const totalSpin = rounds*2*Math.PI + diff;
  const endAngle = spinAngle + totalSpin;

  const dur = 4800 + Math.random()*1800;
  const t0 = performance.now(), a0 = spinAngle;
  let lastSeg=-1;

  function frame(now) {
    const p = Math.min((now-t0)/dur, 1);
    const e = 1 - Math.pow(1-p, 3.8);
    spinAngle = a0 + (endAngle-a0)*e;

    const curSeg = Math.floor((((-spinAngle-Math.PI/2)%(2*Math.PI)+2*Math.PI)%(2*Math.PI))/arc)%n;
    if (curSeg!==lastSeg && p<0.92) { playTick(); lastSeg=curSeg; }

    drawWheel();

    if (p<1) { requestAnimationFrame(frame); }
    else {
      spinAngle=endAngle; spinning=false; drawWheel();
      showResult(segs[tIdx]);
      spinCount++;
      document.getElementById('spinCount').textContent=spinCount;
    }
  }
  requestAnimationFrame(frame);
}

function resetSpin() {
  const btn=document.getElementById('spinBtn');
  btn.disabled=false;
  btn.innerHTML='<span class="btn-icon">🎡</span><span class="btn-txt">QUAY</span>';
}

// ── RESULT ──
function showResult(reward) {
  const panel=document.getElementById('resultPanel');
  const inner=document.getElementById('resultInner');
  const emoji=document.getElementById('resEmoji');
  const rew=document.getElementById('resReward');
  const msg=document.getElementById('resMsg');
  const hCard=document.getElementById('historyCard');
  const hList=document.getElementById('historyList');

  panel.style.display='block';
  rew.textContent=reward;

  hCard.style.display='block';
  const li=document.createElement('li');

  if (reward.includes('Jackpot')) {
    emoji.textContent='💍'; msg.textContent='💖 Định mệnh đã chọn!';
    msg.style.background='linear-gradient(135deg,#FFD700,#FF4F9A)';
    inner.style.background='linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,79,154,0.2))';
    inner.style.borderColor='rgba(255,215,0,0.5)';
    inner.classList.add('jglow');
    playJack(); launchConfetti(90); launchHearts(20); flashScreen('rgba(255,215,0,0.2)');
    li.className='h-jackpot'; li.textContent='💍 '+reward;
  } else if (reward.includes('Thử lại')) {
    emoji.textContent='🦴'; msg.textContent='🦖 Tình yêu cần thêm thử thách~';
    msg.style.background='linear-gradient(135deg,rgba(255,140,0,0.8),rgba(239,68,68,0.8))';
    inner.style.background='linear-gradient(135deg,rgba(255,140,0,0.15),rgba(239,68,68,0.15))';
    inner.style.borderColor='rgba(255,140,0,0.4)';
    inner.classList.remove('jglow');
    playOops(); inner.classList.add('shake');
    setTimeout(()=>inner.classList.remove('shake'),500);
    li.className='h-retry'; li.textContent='🦴 '+reward;
  } else {
    emoji.textContent='🎀'; msg.textContent='💕 Chúc mừng! Thật tuyệt~';
    msg.style.background='linear-gradient(135deg,rgba(255,79,154,0.7),rgba(168,85,247,0.7))';
    inner.style.background='linear-gradient(135deg,rgba(255,79,154,0.12),rgba(168,85,247,0.12))';
    inner.style.borderColor='rgba(255,133,187,0.4)';
    inner.classList.remove('jglow');
    playWin(); launchHearts(10);
    li.className='h-normal'; li.textContent='🎀 '+reward;
  }

  // Add to history
  const num=document.createElement('span');
  num.style.cssText='opacity:0.45;margin-right:4px;font-size:0.72rem;';
  num.textContent=`#${spinCount+1}`;
  li.prepend(num);
  hList.insertBefore(li, hList.firstChild);

  setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),300);

  // reset btn
  const btn=document.getElementById('spinBtn');
  btn.disabled=false;
  btn.innerHTML='<span class="btn-icon">🎡</span><span class="btn-txt">QUAY</span>';
}

// ── EFFECTS ──
const HEARTS=['💕','💖','💗','💝','🩷','💓','❤️'];
function launchHearts(n) {
  for (let i=0;i<n;i++) setTimeout(()=>{
    const h=document.createElement('div');
    h.className='heart-fx';
    h.textContent=HEARTS[Math.floor(Math.random()*HEARTS.length)];
    h.style.cssText=`left:${Math.random()*window.innerWidth}px;top:${window.innerHeight*0.85}px;
      font-size:${1+Math.random()*2}rem;animation-duration:${2.5+Math.random()*2}s;`;
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  }, i*170);
}
const CONF=['#FF4F9A','#FFD700','#A855F7','#34D399','#60A5FA','#FB923C','#F472B6'];
function launchConfetti(n) {
  for (let i=0;i<n;i++) setTimeout(()=>{
    const c=document.createElement('div');
    c.className='conf-fx';
    const sz=5+Math.random()*9;
    c.style.cssText=`left:${Math.random()*window.innerWidth}px;top:-50px;
      width:${sz}px;height:${sz}px;
      background:${CONF[Math.floor(Math.random()*CONF.length)]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      animation-duration:${2+Math.random()*2.5}s;
      animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }, i*25);
}
function flashScreen(c) {
  const f=document.createElement('div');
  f.style.cssText=`position:fixed;inset:0;background:${c};pointer-events:none;z-index:500;
    animation:flashOut 0.6s ease forwards;`;
  const s=document.createElement('style');
  s.textContent='@keyframes flashOut{from{opacity:1}to{opacity:0}}';
  document.head.appendChild(s); document.body.appendChild(f);
  setTimeout(()=>{f.remove();s.remove();},700);
}
</script>
